version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: nomenclature
      POSTGRES_USER: eos
      POSTGRES_PASSWORD: BzXu3VvQ
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: django_app
    command: ./entrypoint.sh
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_NAME: nomenclature
      DB_USER: eos
      DB_PASSWORD: BzXu3VvQ
      DB_HOST: db
      DB_PORT: 5432

volumes:
  postgres_data: